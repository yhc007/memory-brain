<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🧠 Memory Mind Map</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        .node {
            cursor: pointer;
        }
        .node circle {
            stroke: #fff;
            stroke-width: 2px;
            transition: all 0.3s;
        }
        .node:hover circle {
            stroke-width: 4px;
            filter: brightness(1.3);
        }
        .node text {
            fill: #fff;
            font-size: 10px;
            pointer-events: none;
            text-shadow: 0 0 3px rgba(0,0,0,0.8);
        }
        .link {
            stroke: rgba(255,255,255,0.2);
            stroke-width: 1px;
        }
        .link:hover {
            stroke: rgba(255,255,255,0.6);
        }
        #tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 300px;
            pointer-events: none;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #tooltip .tags {
            margin-top: 8px;
            font-size: 11px;
            color: #888;
        }
        #tooltip .tags span {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        #stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
        #legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
        }
        #legend .item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        #legend .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>

        const colors = d3.schemeCategory10;
        
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const svg = d3.select("#container")
            .append("svg")
            .attr("width", width)
            .attr("height", height);
        
        // Add zoom behavior
        const g = svg.append("g");
        
        svg.call(d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            }));
        
        // Create simulation
        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => d.size + 10));
        
        // Draw links
        const link = g.append("g")
            .selectAll("line")
            .data(links)
            .join("line")
            .attr("class", "link")
            .attr("stroke-width", d => d.weight * 3);
        
        // Draw nodes
        const node = g.append("g")
            .selectAll("g")
            .data(nodes)
            .join("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));
        
        node.append("circle")
            .attr("r", d => d.size)
            .attr("fill", d => colors[d.group % 10]);
        
        node.append("text")
            .attr("dx", d => d.size + 5)
            .attr("dy", 4)
            .text(d => d.label);
        
        // Tooltip
        const tooltip = d3.select("#tooltip");
        
        node.on("mouseover", (event, d) => {
            tooltip.style("display", "block")
                .html(`<strong>${d.label}</strong><br>${d.content}<div class="tags">${d.tags.map(t => `<span>#${t}</span>`).join('')}</div>`)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 10) + "px");
        })
        .on("mouseout", () => {
            tooltip.style("display", "none");
        });
        
        // Update positions
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
        
        // Drag functions
        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }
        
        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }
        
        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }
        
        // Build legend
        const groups = [...new Set(nodes.map(n => n.group))];
        const tagNames = {};
        nodes.forEach(n => {
            if (n.tags.length > 0 && !tagNames[n.group]) {
                tagNames[n.group] = n.tags[0];
            }
        });
        
        const legend = d3.select("#legend");
        groups.slice(0, 8).forEach(g => {
            legend.append("div")
                .attr("class", "item")
                .html(`<div class="dot" style="background:${colors[g % 10]}"></div>${tagNames[g] || 'Group ' + g}`);
        });
    </script>
