<h1 class="text-4xl font-bold mb-8">🔍 Search Memories</h1>

<div class="bg-gray-800/50 rounded-2xl p-6 border border-gray-700 mb-6">
    <form hx-post="/search/results" hx-target="#results" hx-swap="innerHTML" class="flex gap-4">
        <input 
            type="text" 
            name="query" 
            placeholder="Search your memories..."
            class="flex-1 bg-gray-700 border border-gray-600 rounded-xl px-6 py-4 text-white placeholder-gray-400 focus:border-cyan-500"
            autofocus
        />
        <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 px-8 py-4 rounded-xl transition">
            Search
        </button>
    </form>
</div>

<div id="results" class="space-y-4"></div>
